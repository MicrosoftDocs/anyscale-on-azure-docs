### YamlMime:Landing

title: Anyscale on Azure documentation
summary: Anyscale on Azure is a managed Ray platform that runs on your Azure Kubernetes Service cluster. It integrates with Microsoft Entra ID, Azure Blob Storage, and Azure Container Registry to run distributed Python workloads in your own Azure tenant.

